wandb_name: pendulum_state_sdp_manual_init
defaults:
  - user: pendulum_state_training_default
  - train_template

hydra:
  run:
    dir: ${user.run_dir}
  sweep:
    dir: ${user.run_dir}

# Flags for initialization
use_sdp_init: False
approximate_lqr: False

# Default: lyapunov (standard Lyapunov stability, backward compatible)
supply_rate:
  type: l2gain
  gamma: 18.5
  w_max: 0.024525
pgd_verifier_steps: 300
pgd_verifier_num_seeds: 5
pgd_verifier_stop_early: False

model:
  normalize_coordinates: True
  # Manual initialization matrices (from LQR)
  K_init: [[-1.3331, -0.7355]]
  P_init: [[0.9051, 0.2113], [0.2113, 0.3025]]

  controller:
    use_frozen_linear: True
    use_trainable_linear: True
    use_nonlinear: False
    activation: leaky_relu  # relu, leaky_relu, tanh, sigmoid

  lyapunov:
    use_frozen_quadratic: False
    use_trainable_quadratic: True
    use_nonlinear: False
    activation: leaky_relu  # relu, leaky_relu, tanh, sigmoid
    hidden_widths: [32, 32]
    
  V_decrease_within_roa: True
  
  # limit_scale: [0.1, 0.3, 0.5, 0.7, 1.0]
  # V_psd_form: "L1"
  # rho_multiplier: [2, 1.75, 1.5, 1.25, 1.0]
  # limit: [0.1, 0.1]

    
  limit_scale: [0.25, 0.5, 0.75, 1.0]
  V_psd_form: "quadratic"
  rho_multiplier: [1.0, 1.0, 1.0, 1.0]
  limit: [2, 2]
  
  dt: 0.05
  velocity_integration: "ExplicitEuler"
  position_integration: "MidPoint"
  
  controller_nlayer: 2
  controller_hidden_dim: 32
  u_max: 0.24525

train:
  train_lyaloss: True
  hard_max: True
  num_samples_per_boundary: 1024

  batch_size: 1024
  epochs: 200
  learning_rate: 1e-4
  pgd_steps: 300
  Vmin_x_pgd_buffer_size: 65536
  buffer_size: 16384
  samples_per_iter: 8192
  
  max_iter: [50, 50, 50, 50]
  
loss:
  s_scale: 1
  candidate_roa_states_weight: 0
  l1_reg: 1e-5
  candidate_roa_states:
    - [0, 0]
  always_candidate_roa_regulizer: False
